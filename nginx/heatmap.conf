# Street View Heatmap - Nginx Configuration
# Public frontend serving with security headers and API proxying
#
# Setup:
# 1. Copy to /etc/nginx/sites-available/heatmap
# 2. Replace 'yourdomain.com' with your actual domain
# 3. Enable: sudo ln -s /etc/nginx/sites-available/heatmap /etc/nginx/sites-enabled/
# 4. Test: sudo nginx -t
# 5. Reload: sudo systemctl reload nginx
# 6. After DNS propagation, run: sudo certbot --nginx -d yourdomain.com

# Rate limiting zone for API endpoints (100 requests/minute per IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

# Upstream Flask application
upstream heatmap_app {
    server 127.0.0.1:5001;
    keepalive 32;
}

server {
    listen 80;
    server_name yourdomain.com;

    # Logging
    access_log /var/log/nginx/heatmap_access.log;
    error_log /var/log/nginx/heatmap_error.log;

    # Client body size limit (for API requests)
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        application/xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ==========================================================
    # BLOCKED ROUTES - Return 404 for admin/config pages
    # ==========================================================

    # Block the /config web page entirely
    location = /config {
        return 404;
    }

    # ==========================================================
    # STATIC FILES - Served with caching
    # ==========================================================

    location /static/ {
        proxy_pass http://heatmap_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Cache static assets
        expires 1d;
        add_header Cache-Control "public, immutable";

        # Security headers (must repeat after add_header)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ==========================================================
    # API ENDPOINTS - Rate limited, proxied to Flask
    # ==========================================================

    location /api/ {
        # Apply rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://heatmap_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass through API key header for authentication
        proxy_set_header X-API-Key $http_x_api_key;

        # Timeouts for long-running operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }

    # ==========================================================
    # WEB PAGES - Public frontend
    # ==========================================================

    # Main map page
    location = / {
        proxy_pass http://heatmap_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dashboard page
    location = /dashboard {
        proxy_pass http://heatmap_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Instructions page
    location = /instructions {
        proxy_pass http://heatmap_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Catch-all: return 404 for any other routes
    location / {
        return 404;
    }
}

