# Street View Heatmap Configuration
# ==================================
# Environment variables can be substituted using ${VAR} or ${VAR:-default} syntax

app:
  host: 0.0.0.0
  port: 5001  # Changed from 5000 to avoid macOS AirPlay Receiver conflict
  api_key: ${API_KEY:-changeme}  # API key for write operations
  debug: false

database:
  url: ${DATABASE_URL}  # PostgreSQL connection string

google:
  api_key: ${GOOGLE_MAPS_API_KEY}  # Google Maps API key for Street View

scheduler:
  enabled: true
  interval_hours: 24
  # Alternative: cron expression (takes precedence over interval_hours)
  # cron: "0 2 * * *"  # 2 AM daily

update:
  batch_size: 150              # Tiles to process per job
  concurrency: 80             # Concurrent Street View API requests
  min_age_for_recheck_days: 90  # Skip locations checked more recently
  overpass_delay_seconds: 1   # Delay between Overpass API requests
  samples_per_road: 5         # Base samples per road segment
  adaptive_sampling: true     # Adjust samples based on road importance

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: logs/heatmap_app.log
  max_bytes: 10485760  # 10MB
  backup_count: 5
