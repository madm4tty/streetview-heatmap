<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Street View Heatmap - Visualize Google Street View coverage and image age across the UK">
    <meta name="theme-color" content="#2563eb">

    <title>{% block title %}Street View Heatmap{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}">
    <link rel="alternate icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin="anonymous">

    <!-- Main Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Skip Link for Accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Navigation -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="navbar-container">
            <!-- Brand -->
            <a href="{{ url_for('pages.index') }}" class="navbar-brand">
                <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
                <span class="brand-text">Street View Heatmap</span>
            </a>

            <!-- Mobile Menu Toggle -->
            <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="navbar-menu">
                <span class="navbar-toggle-icon"></span>
            </button>

            <!-- Navigation Links -->
            <div class="navbar-menu" id="navbar-menu">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a href="{{ url_for('pages.index') }}" class="nav-link {% if request.endpoint == 'pages.index' %}active{% endif %}" aria-current="{% if request.endpoint == 'pages.index' %}page{% endif %}">
                            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
                                <line x1="8" y1="2" x2="8" y2="18"/>
                                <line x1="16" y1="6" x2="16" y2="22"/>
                            </svg>
                            <span>Map</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{{ url_for('pages.dashboard') }}" class="nav-link {% if request.endpoint == 'pages.dashboard' %}active{% endif %}" aria-current="{% if request.endpoint == 'pages.dashboard' %}page{% endif %}">
                            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <line x1="3" y1="9" x2="21" y2="9"/>
                                <line x1="9" y1="21" x2="9" y2="9"/>
                            </svg>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{{ url_for('pages.config_page') }}" class="nav-link {% if request.endpoint == 'pages.config_page' %}active{% endif %}" aria-current="{% if request.endpoint == 'pages.config_page' %}page{% endif %}">
                            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                            </svg>
                            <span>Config</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{{ url_for('pages.instructions') }}" class="nav-link {% if request.endpoint == 'pages.instructions' %}active{% endif %}" aria-current="{% if request.endpoint == 'pages.instructions' %}page{% endif %}">
                            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="16" x2="12" y2="12"/>
                                <line x1="12" y1="8" x2="12.01" y2="8"/>
                            </svg>
                            <span>Help</span>
                        </a>
                    </li>
                </ul>

                <!-- Status Indicator -->
                <div class="navbar-status" id="navbar-status">
                    <span class="status-dot status-unknown" id="status-dot" aria-hidden="true"></span>
                    <span class="status-text" id="status-text">Checking...</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="main-content {% block main_class %}{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    {% block footer %}
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-left">
                <span class="footer-brand">Street View Heatmap</span>
                <span class="footer-separator" aria-hidden="true">&middot;</span>
                <span class="footer-tech">Flask + PostGIS + Leaflet</span>
            </div>
            <div class="footer-right">
                <span class="footer-update" id="footer-update">
                    Last update: <span id="last-update-time">--</span>
                </span>
            </div>
        </div>
    </footer>
    {% endblock %}

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin="anonymous"></script>

    <!-- App Scripts -->
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>

    <!-- Navigation Toggle Script -->
    <script>
        // Mobile navigation toggle
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.getElementById('navbar-toggle');
            const menu = document.getElementById('navbar-menu');

            if (toggle && menu) {
                toggle.addEventListener('click', function() {
                    const expanded = toggle.getAttribute('aria-expanded') === 'true';
                    toggle.setAttribute('aria-expanded', !expanded);
                    menu.classList.toggle('show');
                });

                // Close menu when clicking outside
                document.addEventListener('click', function(e) {
                    if (!toggle.contains(e.target) && !menu.contains(e.target)) {
                        toggle.setAttribute('aria-expanded', 'false');
                        menu.classList.remove('show');
                    }
                });

                // Close menu on escape key
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Escape' && menu.classList.contains('show')) {
                        toggle.setAttribute('aria-expanded', 'false');
                        menu.classList.remove('show');
                        toggle.focus();
                    }
                });
            }

            // Update status indicator
            updateNavStatus();
            setInterval(updateNavStatus, 30000); // Update every 30 seconds
        });

        // Update navigation status indicator
        async function updateNavStatus() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const lastUpdate = document.getElementById('last-update-time');

            try {
                const status = await api.getStatus();

                // Update status dot
                dot.className = 'status-dot';
                if (status.current_job && status.current_job.status === 'running') {
                    dot.classList.add('status-running');
                    text.textContent = 'Running';
                } else {
                    dot.classList.add('status-idle');
                    text.textContent = 'Idle';
                }

                // Update last update time
                if (status.last_update) {
                    lastUpdate.textContent = formatTimestamp(status.last_update, { relative: true });
                } else {
                    lastUpdate.textContent = 'Never';
                }
            } catch (error) {
                dot.className = 'status-dot status-error';
                text.textContent = 'Offline';
                lastUpdate.textContent = '--';
            }
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
